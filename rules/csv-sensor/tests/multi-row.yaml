# Single message containing two data rows — each row becomes a separate measurement.
inputs:
  - payload: |-
      temp|hum
      22.5|45
      12.3|55
    payloadFormat: text
    topic: "sensors/node-01/readings"
    clientID: "node-01"
    time: "2026-01-01T12:00:00.000Z"

expectedOutput:
  - - cumulocityType: measurement
      externalSource:
        - externalId: node-01
          type: c8y_Serial
      payload:
        type: c8y_SensorReading
        time: "2026-01-01T12:00:00.000Z"
        temp:
          value: 22.5
          unit: ""
        hum:
          value: 45
          unit: ""
    - cumulocityType: measurement
      externalSource:
        - externalId: node-01
          type: c8y_Serial
      payload:
        type: c8y_SensorReading
        time: "2026-01-01T12:00:00.000Z"
        temp:
          value: 12.3
          unit: ""
        hum:
          value: 55
          unit: ""
